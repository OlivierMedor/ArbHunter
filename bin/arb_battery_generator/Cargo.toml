[package]
name = "arb_battery_generator"
version = "0.1.0"
edition = "2021"

[dependencies]
arb_types = { path = "../../crates/arb_types" }
arb_config = { path = "../../crates/arb_config" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
alloy-primitives = { version = "0.8.20", features = ["serde"] }
alloy-provider = "0.8.2"
alloy-rpc-types-eth = "0.8.2"
alloy-eips = "0.8.2"
alloy-contract = "0.8.2"
alloy-sol-types = "0.8.20"
tokio = { version = "1.0", features = ["full"] }
hex = "0.4"
tracing = "0.1"

