[package]
name = "arb_daemon"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.0", features = ["full"] }
tracing = "0.1"
tracing-subscriber = "0.3"
arb_config = { path = "../../crates/arb_config" }
arb_types = { path = "../../crates/arb_types" }
arb_metrics = { path = "../../crates/arb_metrics" }
arb_providers = { path = "../../crates/arb_providers" }
arb_ingest = { path = "../../crates/arb_ingest" }
arb_state = { path = "../../crates/arb_state" }
arb_route = { path = "../../crates/arb_route" }
arb_filter = { path = "../../crates/arb_filter" }
arb_sim = { path = "../../crates/arb_sim" }
arb_execute = { path = "../../crates/arb_execute" }
axum = "0.7"
alloy-primitives = { version = "0.8", features = ["serde"] }
alloy-signer-local = "0.8"
serde_json = "1.0.149"
