version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-arb}
      POSTGRES_PASSWORD: ${DB_PASS:-arb}
      POSTGRES_DB: ${DB_NAME:-arb_metrics}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U arb" ]
      interval: 5s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:v2.45.0
    ports:
      - "9095:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:10.0.3
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus

  forge:
    image: ghcr.io/foundry-rs/foundry:latest
    profiles:
      - tools
    entrypoint: ["/usr/bin/env"]
    volumes:
      - .:/workspace
    working_dir: /workspace/contracts

  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    profiles:
      - local
    entrypoint: >
      sh -c '
      if [ -n "$$ANVIL_FORK_URL" ]; then
        anvil --host 0.0.0.0 --fork-url $$ANVIL_FORK_URL $${ANVIL_FORK_BLOCK_NUMBER:+--fork-block-number $$ANVIL_FORK_BLOCK_NUMBER}
      else
        anvil --host 0.0.0.0
      fi'
    ports:
      - "8545:8545"

volumes:
  pgdata:
