version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-arb}
      POSTGRES_PASSWORD: ${DB_PASS:-arb}
      POSTGRES_DB: ${DB_NAME:-arb_metrics}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arb"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
